<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — SMOKE ROOM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d0d0d;--surface:#161616;--surface2:#1c1c1c;--border:#2a2a2a;--accent:#e8ff00;--accent2:#ff4c00;--text:#f0f0f0;--muted:#666;--font-h:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;--r:4px;--max:1200px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.6;overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    button{font-family:var(--font-b);cursor:pointer;border:none}
    .container{max-width:var(--max);margin:0 auto;padding:0 20px}

    /* HEADER */
    header{position:sticky;top:0;z-index:100;background:rgba(13,13,13,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;height:58px}
    .logo{font-family:var(--font-h);font-size:26px;letter-spacing:.06em}.logo span{color:var(--accent)}
    nav{display:flex;gap:28px}
    nav a{font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:color .2s}
    nav a:hover{color:var(--text)}
    .cart-btn{position:relative;background:var(--accent);color:#000;font-weight:700;font-size:12px;letter-spacing:.07em;text-transform:uppercase;padding:8px 18px;border-radius:var(--r);transition:opacity .2s}
    .cart-btn:hover{opacity:.85}
    .cart-badge{position:absolute;top:-6px;right:-6px;background:var(--accent2);color:#fff;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}

    /* BREADCRUMB */
    .breadcrumb{padding:20px 0;font-size:12px;color:var(--muted);letter-spacing:.06em;border-bottom:1px solid var(--border)}
    .breadcrumb a{color:var(--muted);transition:color .2s}.breadcrumb a:hover{color:var(--text)}
    .breadcrumb span{margin:0 8px}

    /* PRODUCT PAGE */
    .product-layout{display:grid;grid-template-columns:1fr 1fr;gap:64px;padding:56px 0 80px;align-items:start}

    /* LEFT: GALLERY */
    .gallery{position:sticky;top:78px}
    .main-img{aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:140px;position:relative;overflow:hidden}
    .main-img .glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,rgba(232,255,0,.1),transparent 65%);pointer-events:none}
    .main-img .badge-new{position:absolute;top:16px;left:16px;background:var(--accent2);color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:2px}
    .thumbs{display:flex;gap:8px;margin-top:12px}
    .thumb{width:72px;height:72px;background:var(--surface);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:border-color .2s}
    .thumb:hover,.thumb.active{border-color:var(--accent)}

    /* RIGHT: INFO */
    .product-info{}
    .product-cat{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
    .product-brand-big{font-family:var(--font-h);font-size:18px;color:var(--muted);letter-spacing:.06em}
    .product-name-big{font-family:var(--font-h);font-size:clamp(40px,6vw,64px);line-height:.95;letter-spacing:.01em;margin-bottom:16px}
    .product-desc-full{color:#aaa;font-size:14px;line-height:1.75;margin-bottom:28px;max-width:460px}

    /* TAGS */
    .product-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
    .ptag{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:2px;letter-spacing:.06em}

    /* OPTION GROUPS */
    .option-group{margin-bottom:24px}
    .option-label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;gap:8px;align-items:center}
    .option-label strong{color:var(--accent);font-size:13px;font-weight:700}
    .option-pills{display:flex;gap:8px;flex-wrap:wrap}
    .opill{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500;padding:9px 18px;border-radius:var(--r);cursor:pointer;transition:all .18s;user-select:none}
    .opill:hover{border-color:var(--muted)}
    .opill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
    .opill.unavailable{opacity:.3;cursor:not-allowed;text-decoration:line-through}

    /* PRICE + CTA */
    .price-row{display:flex;align-items:center;gap:20px;margin-bottom:20px}
    .price-big{font-family:var(--font-h);font-size:52px;line-height:1;letter-spacing:.01em}
    .price-old{font-size:20px;color:var(--muted);text-decoration:line-through;font-family:var(--font-h)}
    .cta-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:32px}
    .qty-control{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .qty-btn{background:transparent;color:var(--text);font-size:18px;width:40px;height:46px;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .qty-btn:hover{background:var(--border)}
    .qty-num{font-size:15px;font-weight:500;width:36px;text-align:center}
    .add-big-btn{flex:1;background:var(--accent);color:#000;font-weight:700;font-size:14px;letter-spacing:.08em;text-transform:uppercase;padding:14px 28px;border-radius:var(--r);transition:opacity .15s,transform .15s}
    .add-big-btn:hover{opacity:.88;transform:translateY(-1px)}
    .tg-order-btn{background:transparent;border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500;padding:14px 20px;border-radius:var(--r);display:flex;align-items:center;gap:8px;transition:border-color .2s}
    .tg-order-btn:hover{border-color:#229ED9;color:#229ED9}

    /* FEATURES */
    .features{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:32px}
    .feature-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
    .f-icon{font-size:20px;flex-shrink:0}
    .f-text{font-size:12px;color:var(--muted);line-height:1.5}
    .f-text strong{display:block;color:var(--text);font-size:13px;margin-bottom:2px}

    /* DIVIDER */
    .divider{border:none;border-top:1px solid var(--border);margin:32px 0}

    /* SPECS TABLE */
    .specs-title{font-family:var(--font-h);font-size:26px;letter-spacing:.04em;margin-bottom:16px}
    .specs-table{width:100%;border-collapse:collapse}
    .specs-table tr{border-bottom:1px solid var(--border)}
    .specs-table td{padding:11px 0;font-size:13px}
    .specs-table td:first-child{color:var(--muted);width:45%}
    .specs-table td:last-child{color:var(--text);font-weight:500}

    /* RELATED */
    .related-section{padding:60px 0 80px;border-top:1px solid var(--border)}
    .section-title{font-family:var(--font-h);font-size:clamp(36px,5vw,52px);letter-spacing:.02em;margin-bottom:32px}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

    /* mini card */
    .mini-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer}
    .mini-card:hover{border-color:#3a3a3a;transform:translateY(-2px)}
    .mini-img{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:60px}
    .mini-body{padding:12px 14px}
    .mini-brand{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
    .mini-name{font-weight:500;font-size:13px;margin-top:2px}
    .mini-price{font-family:var(--font-h);font-size:20px;margin-top:8px}

    /* CART DRAWER */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
    .overlay.open{opacity:1;pointer-events:all}
    .cart-drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--surface);border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
    .cart-drawer.open{transform:translateX(0)}
    .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
    .drawer-title{font-family:var(--font-h);font-size:28px}
    .close-btn{background:transparent;color:var(--muted);font-size:22px;padding:4px;transition:color .2s}
    .close-btn:hover{color:var(--text)}
    .drawer-items{flex:1;overflow-y:auto;padding:16px 24px}
    .cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
    .ci-emoji{font-size:36px;width:48px;text-align:center}
    .ci-info{flex:1}
    .ci-name{font-weight:500;font-size:14px}
    .ci-variant{font-size:12px;color:var(--muted);margin-top:2px}
    .ci-price{font-family:var(--font-h);font-size:18px;margin-top:4px}
    .ci-remove{background:transparent;color:var(--muted);font-size:18px;padding:4px;transition:color .2s}
    .ci-remove:hover{color:var(--accent2)}
    .drawer-form{padding:20px 24px;border-top:1px solid var(--border);flex-shrink:0}
    .form-title{font-family:var(--font-h);font-size:22px;margin-bottom:14px}
    .form-field{margin-bottom:12px}
    .form-field label{display:block;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
    .form-field input,.form-field select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:14px;padding:10px 14px;border-radius:var(--r);outline:none;transition:border-color .2s;-webkit-appearance:none}
    .form-field input:focus,.form-field select:focus{border-color:var(--accent)}
    .submit-btn{width:100%;background:var(--accent);color:#000;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:14px;border-radius:var(--r);margin-top:8px;transition:opacity .2s}
    .submit-btn:hover{opacity:.88}
    .empty-cart{text-align:center;padding:60px 20px;color:var(--muted)}

    /* TG FLOAT */
    .tg-float{position:fixed;bottom:28px;right:24px;z-index:150;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
    .tg-tooltip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;white-space:nowrap;animation:fadeUp .4s ease;display:none}
    .tg-float:hover .tg-tooltip{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .tg-btn{width:56px;height:56px;background:#229ED9;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(34,158,217,.4);transition:transform .2s}
    .tg-btn:hover{transform:scale(1.1)}
    .tg-btn svg{width:28px;height:28px}

    /* TOAST */
    .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:12px 22px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;z-index:300;transition:opacity .3s,transform .3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* MOBILE */
    @media(max-width:860px){
      nav{display:none}
      .product-layout{grid-template-columns:1fr;gap:32px;padding:32px 0 60px}
      .gallery{position:static}
      .features{grid-template-columns:1fr}
      .related-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="index.html" class="logo">SMOKE<span>.</span>ROOM</a>
    <nav>
      <a href="index.html">Головна</a>

      <a href="contacts.html">Контакти</a>

<div class="container">

    <span id="bcProduct">Товар</span>
  </div>
</div>

<div class="container">
  <div class="product-layout">

    <!-- GALLERY -->
    <div class="gallery">
      <div class="main-img" id="mainImg">
        <div class="glow"></div>
        <span id="mainEmoji">💧</span>
        <span class="badge-new" id="badgeNew" style="display:none">New</span>
      </div>
      <div class="thumbs" id="thumbsRow"></div>
    </div>

    <!-- INFO -->
    <div class="product-info" id="productInfo">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- RELATED -->
<section class="related-section">
  <div class="container">
    <h2 class="section-title">СХОЖІ ТОВАРИ</h2>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</section>

<!-- CART DRAWER -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-head">
    <span class="drawer-title">КОШИК</span>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems">
    <div class="empty-cart"><div style="font-size:56px">🛒</div><p style="margin-top:12px;color:var(--muted)">Кошик порожній</p></div>
  </div>
  <div class="drawer-form" id="drawerForm" style="display:none">
            <div class="form-title">ОФОРМИТИ</div>
    <div class="form-field">
      <label>ПІБ</label>
      <input type="text" id="fname" placeholder="Прізвище Ім'я По-батькові" />
    </div>
    <div class="form-field">
      <label>Телефон</label>
      <input type="tel" id="fphone" placeholder="+380..." />
    </div>
    <div class="form-field">
      <label>Доставка</label>
      <select id="fdelivery" onchange="toggleNovaFields(this.value)">
        <option value="pickup">🏪 Самовивіз у Дніпрі</option>
        <option value="nova">📦 Нова Пошта (по Україні)</option>
      </select>
    </div>
    <div id="novaFields" style="display:none">
      <div class="form-field"><label>Місто</label><input type="text" id="fcity" placeholder="Київ" /></div>
      <div class="form-field"><label>Область</label><input type="text" id="fregion" placeholder="Київська" /></div>
      <div class="form-field"><label>Номер відділення НП</label><input type="number" id="fbranch" placeholder="1" min="1" /></div>
      <div class="form-field"><label>Адреса відділення</label><input type="text" id="faddress" placeholder="вул. Кондратюка, 2" /></div>
    </div>
    <div class="form-field">
      <label>Спосіб оплати</label>
      <select id="fpayment" onchange="toggleCardInfo(this.value)">
        <option value="cod">💵 Післяплата</option>
        <option value="card">💳 Переказ на карту</option>
      </select>
    </div>
    <div id="cardInfo" style="display:none;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:4px;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:11px;color:#666;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">Номер карти</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;color:#e8ff00" onclick="copyCard(this)" title="Натисни щоб скопіювати">4441 1111 8866 1288 📋</div>
      <div style="font-size:11px;color:#666;margin-top:6px">Після переказу прикріпи скріншот:</div>
      <label id="screenshotLabel" style="display:flex;align-items:center;gap:8px;margin-top:8px;background:#2a2a2a;border:1px dashed #444;border-radius:4px;padding:10px 12px;cursor:pointer;font-size:12px;color:#aaa;transition:border-color .2s">
        <span style="font-size:18px">📎</span>
        <span id="screenshotText">Прикріпити скріншот оплати</span>
        <input type="file" id="screenshotFile" accept="image/*" style="display:none" onchange="handleScreenshot(this)" />
      </label>
    </div>
    <button class="submit-btn" onclick="submitOrder()">Відправити замовлення →</button>
  </div>
</div>

<!-- TG FLOAT -->
<div class="tg-float">
  <a class="tg-btn" href="https://t.me/V3e3d" target="_blank">
    <svg viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.94z"/></svg>

  <div class="tg-tooltip">Написати в Telegram</div>
</div>

  const TG_BOT_TOKEN = '8707908880:AAEOZnNOBK4IG30KyQ6518NQQlhVF14BnB4';
  const TG_CHAT_ID   = '1438736640';

  const allProducts = [

  const params = new URLSearchParams(window.location.search);
  const productId = parseInt(params.get('id')) || 1;
  const product = allProducts.find(p => p.id === productId) || allProducts[0];

  let selectedVariant = product.variants[0];

  // ── RENDER PRODUCT ──
  function renderProduct() {
    document.title = `${product.name} — SMOKE ROOM`;

    document.getElementById('mainEmoji').textContent = product.emoji;
    if (product.isNew) document.getElementById('badgeNew').style.display = '';

      const mgs  = [...new Set(product.variants.map(v => v.split('·')[1]?.trim()).filter(Boolean))];
      optionsHTML = `
        <div class="option-group">
          <div class="option-label">Об'єм <strong id="selVol">${vols[0]}</strong></div>
          <div class="option-pills">${vols.map((v,i) => `<div class="opill ${i===0?'active':''}" onclick="pickVol('${v}',this)">${v}</div>`).join('')}</div>
        </div>
        <div class="option-group">
          <div class="option-label">Міцність <strong id="selMg">${mgs[0]}</strong></div>
          <div class="option-pills">${mgs.map((m,i) => `<div class="opill ${i===0?'active':''}" onclick="pickMg('${m}',this)">${m}</div>`).join('')}</div>
        </div>
      `;
    } else {
      optionsHTML = `
        <div class="option-group">
          <div class="option-label">Варіант <strong id="selVariant">${product.variants[0]}</strong></div>
          <div class="option-pills">${product.variants.map((v,i) => `<div class="opill ${i===0?'active':''}" onclick="pickVariant('${v}',this)">${v}</div>`).join('')}</div>
        </div>
      `;
    }

    // specs table
    const specsHTML = Object.entries(product.specs || {}).map(([k,v]) => `
      <tr><td>${k}</td><td>${v}</td></tr>
    `).join('');

    // features
    const features = [
      { icon:'🚚', title:'Швидка доставка', text:'Нова Пошта по всій Україні. Відправка в день замовлення.' },
      { icon:'🏪', title:'Самовивіз', text:'Дніпро. Готово до видачі протягом 2 годин.' },
      { icon:'✅', title:'Оригінал', text:'Тільки перевірені постачальники та оригінальна продукція.' },
      { icon:'💬', title:'Консультація', text:'Напиши в Telegram — відповімо одразу.' },
    ];

    document.getElementById('productInfo').innerHTML = `
      <div class="product-cat">${catMap[product.cat] || product.cat}</div>
      <div class="product-brand-big">${product.brand}</div>
      <h1 class="product-name-big">${product.name}</h1>
      <p class="product-desc-full">${product.desc}</p>

      <div class="product-tags">
        ${product.isNew ? '<span class="ptag" style="color:var(--accent2);border-color:var(--accent2)">🔥 Новинка</span>' : ''}
        <span class="ptag">Оригінал</span>
        <span class="ptag">В наявності</span>
      </div>

      ${optionsHTML}

      <div class="price-row">
        <div class="price-big" id="priceBig">${product.price}₴</div>
      </div>

      <div class="cta-row">
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qtyNum">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button class="add-big-btn" onclick="addToCart()">+ Додати в кошик</button>
        <a class="tg-order-btn" href="https://t.me/V3e3d" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#229ED9"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.94z"/></svg>
          Telegram
        </a>
      </div>

      <div class="features">
        ${features.map(f => `
          <div class="feature-item">
            <span class="f-icon">${f.icon}</span>
            <div class="f-text"><strong>${f.title}</strong>${f.text}</div>
          </div>
        `).join('')}
      </div>

      <hr class="divider" />
      <div class="specs-title">ХАРАКТЕРИСТИКИ</div>
      <table class="specs-table"><tbody>${specsHTML}</tbody></table>
    `;
  }

  // ── INTERACTIONS ──
  function selectThumb(el, emoji) {
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('mainEmoji').textContent = emoji;
  }

  let selectedVol = '', selectedMg = '';
  function pickVol(v, el) {
    selectedVol = v;
    document.querySelectorAll('#productInfo .opill').forEach(p => { if(p.textContent.includes('мл')) p.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('selVol').textContent = v;
    updateVariantFromParts();
  }
  function pickMg(m, el) {
    selectedMg = m;
    document.querySelectorAll('#productInfo .opill').forEach(p => { if(p.textContent.includes('мг')) p.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('selMg').textContent = m;
    updateVariantFromParts();
  }
  function updateVariantFromParts() {
    if (selectedVol && selectedMg) selectedVariant = `${selectedVol}·${selectedMg}`;
  }
  function pickVariant(v, el) {
    selectedVariant = v;
    document.querySelectorAll('#productInfo .opill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    const el2 = document.getElementById('selVariant');
    if (el2) el2.textContent = v;
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qtyNum').textContent = qty;
    document.getElementById('priceBig').textContent = (product.price * qty) + '₴';
  }

  // ── CART ──
  function addToCart() {
    const ex = cart.find(x => x.id === product.id && x.variant === selectedVariant);
    if (ex) ex.qty += qty; else cart.push({...product, variant: selectedVariant, qty});
    updateBadge(); showToast(`✓ ${product.name} · ${selectedVariant} ×${qty}`); renderDrawer(); openCart();
  }
  function removeFromCart(pid, variant) {
    cart = cart.filter(x => !(x.id === pid && x.variant === variant));
    updateBadge(); renderDrawer();
  }
  function updateBadge() { document.getElementById('cartBadge').textContent = cart.reduce((s,x)=>s+x.qty,0); }
  function renderDrawer() {
    const container = document.getElementById('drawerItems');
    const form = document.getElementById('drawerForm');
    if (!cart.length) {
      container.innerHTML = '<div class="empty-cart"><div style="font-size:56px">🛒</div><p style="margin-top:12px;color:var(--muted)">Кошик порожній</p></div>';
      form.style.display = 'none'; return;
    }
    form.style.display = 'block';
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="ci-emoji">${item.emoji}</div>
        <div class="ci-info">
          <div class="ci-name">${item.brand} ${item.name}</div>
          <div class="ci-variant">${item.variant} · ×${item.qty}</div>
          <div class="ci-price">${item.price*item.qty}₴</div>
        </div>
        <button class="ci-remove" onclick="removeFromCart(${item.id},'${item.variant}')">✕</button>
      </div>
    `).join('');
  }
  function openCart()  { document.getElementById('cartDrawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); renderDrawer(); }
  function closeCart() { document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

      function toggleNovaFields(val) {
    document.getElementById('novaFields').style.display = val === 'nova' ? 'block' : 'none';
  }
  function toggleCardInfo(val) {
    document.getElementById('cardInfo').style.display = val === 'card' ? 'block' : 'none';
  }
  function copyCard(el) {
    navigator.clipboard.writeText('4441111188661288').then(function() {
      showToast('Номер карти скопійовано!');
    }).catch(function() {
      showToast('4441 1111 8866 1288');
    });
  }
  function handleScreenshot(input) {
    if (input.files && input.files[0]) {
      document.getElementById('screenshotText').textContent = '✓ ' + input.files[0].name;
      document.getElementById('screenshotLabel').style.borderColor = '#e8ff00';
    }
  }

  async function submitOrder() {
    const name     = document.getElementById('fname').value.trim();
    const phone    = document.getElementById('fphone').value.trim();
    const delivery = document.getElementById('fdelivery').value;
    const payment  = document.getElementById('fpayment').value;
    const payLabel = payment === 'cod' ? 'Після оплата' : 'Переказ на карту (4441 1111 8866 1288)';

    if (!name || !phone) { alert('Заповни ПІБ та телефон'); return; }

    let deliveryBlock = '';
    if (delivery === 'nova') {
      const city    = document.getElementById('fcity').value.trim();
      const region  = document.getElementById('fregion').value.trim();
      const branch  = document.getElementById('fbranch').value.trim();
      const address = document.getElementById('faddress').value.trim();
      if (!city || !branch) { alert('Вкажи місто та номер відділення НП'); return; }
      deliveryBlock = 'Доставка: ' + city + ', ' + region + ' / НП №' + branch + ' / ' + address;
    } else {
      deliveryBlock = 'Доставка: Самовивіз (Дніпро)';
    }

    const total = cart.reduce((s,x) => s + x.price * x.qty, 0);
    const lines = cart.map(x => x.brand + ' ' + x.name + ' [' + x.variant + '] x' + x.qty + ' = ' + (x.price * x.qty) + 'грн').join('\n');
    const text = '📦 Замовлення\n\n👤 ' + name + '\n📱 ' + phone + '\n' + deliveryBlock + '\n💳 ' + payLabel + '\n\n🛒\n' + lines + '\n\n💰 ' + total + 'грн';
    const encoded = encodeURIComponent(text);

    // Step 1: send text message
    const xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.telegram.org/bot' + TG_BOT_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encoded, true);
    xhr.onload = function() {
      try {
        if (JSON.parse(xhr.responseText).ok) {
          // Step 2: if card payment and screenshot attached — send photo
          const fileInput = document.getElementById('screenshotFile');
          if (payment === 'card' && fileInput && fileInput.files && fileInput.files[0]) {
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('caption', 'Скріншот оплати від ' + name);
            formData.append('photo', fileInput.files[0]);
            const xhr2 = new XMLHttpRequest();
            xhr2.open('POST', 'https://api.telegram.org/bot' + TG_BOT_TOKEN + '/sendPhoto', true);
            xhr2.onload = function() {
              cart=[]; updateBadge(); closeCart();
              showToast('Замовлення + скріншот відправлено!');
            };
            xhr2.onerror = function() {
              cart=[]; updateBadge(); closeCart();
              showToast('Замовлення відправлено! Скрін надішли @V3e3d');
            };
            xhr2.send(formData);
          } else {
            cart=[]; updateBadge(); closeCart();
            showToast('Замовлення відправлено!');
          }
        } else {
          showToast('Помилка. Напиши @V3e3d');
        }
      } catch(e) { showToast('Помилка. Напиши @V3e3d'); }
    };
    xhr.onerror = function() { showToast('Немає зв\'язку. Напиши @V3e3d'); };
    xhr.send();
  }


  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2600);
  }

  // ── RELATED ──
  function renderRelated() {
    const related = allProducts.filter(p => p.id !== product.id && p.cat === product.cat).slice(0, 4);
    document.getElementById('relatedGrid').innerHTML = related.map(p => `
      <div class="mini-card" onclick="window.location.href='product.html?id=${p.id}'">
        <div class="mini-img">${p.emoji}</div>
        <div class="mini-body">
          <div class="mini-brand">${p.brand}</div>
          <div class="mini-name">${p.name}</div>
          <div class="mini-price">${p.price}₴</div>
        </div>
      </div>
    `).join('');
  }

  // ── INIT ──
  renderProduct();
  renderRelated();

  // init vol/mg from first variant
  if (product.cat === 'liquid' && product.variants.length) {
    const parts = product.variants[0].split('·');
    selectedVol = parts[0]?.trim();
    selectedMg  = parts[1]?.trim();
    selectedVariant = product.variants[0];
  }
</script>
</body>
</html>
